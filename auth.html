<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Access · AI Growth Base</title>
<meta name="description" content="Sign in to your AI Growth Base client portal.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%2064%2064%22%3E%3Crect%20width=%2264%22%20height=%2264%22%20rx=%2214%22%20fill=%22%23122238%22/%3E%3Crect%20x=%2220%22%20y=%2220%22%20width=%2224%22%20height=%2224%22%20rx=%224%22%20transform=%22rotate(45%2032%2032)%22%20fill=%22%23E8A51C%22/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --paper:#F3F5F8;
  --card:#FFFFFF;
  --ink:#0E1B2C;
  --ink-soft:#445061;
  --gold:#E8A51C;
  --gold-deep:#9C6E06;
  --line:#DCE1E8;
  --navy-card:#122238;
  --display:'Bricolage Grotesque',sans-serif;
  --body:'Instrument Sans',sans-serif;
  --mono:'Space Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--body);background:var(--paper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit}
h1,h2{font-family:var(--display);letter-spacing:-.015em;line-height:1.1}

nav{background:rgba(243,245,248,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.nav-inner{max-width:1120px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:68px}
.logo{font-family:var(--display);font-weight:800;font-size:20px;text-decoration:none;display:flex;align-items:center;gap:8px}
.logo-dot{width:12px;height:12px;border-radius:3px;background:var(--gold);display:inline-block;transform:rotate(45deg)}
.back{font-size:14.5px;font-weight:600;text-decoration:none;color:var(--ink-soft)}
.back:hover{color:var(--ink)}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:56px 20px}
.auth-card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:40px;box-shadow:0 24px 60px rgba(14,27,44,.1);animation:rise .7s ease both}
@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);display:inline-flex;align-items:center;gap:10px;margin-bottom:12px}
.eyebrow::before{content:"";width:22px;height:2px;background:var(--gold)}
.auth-card h1{font-size:26px;margin-bottom:6px}
.auth-card p.sub{font-size:14.5px;color:var(--ink-soft);margin-bottom:28px}

form{display:flex;flex-direction:column;gap:16px}
.field label{display:block;font-size:13.5px;font-weight:600;margin-bottom:6px}
.field input{width:100%;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:13px 15px;font-family:var(--body);font-size:15px;color:var(--ink);transition:border-color .2s}
.field input:focus{border-color:var(--gold);outline:none}
.btn{font-family:var(--body);font-weight:600;font-size:16px;padding:14px;border-radius:999px;border:none;cursor:pointer;background:var(--gold);color:var(--ink);box-shadow:0 6px 18px rgba(232,165,28,.35);transition:transform .2s,box-shadow .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(232,165,28,.45)}
.btn:disabled{opacity:.6;cursor:default;transform:none}
.notice{display:none;font-size:14px;font-weight:600;text-align:center;border-radius:10px;padding:12px;line-height:1.5}
.notice.ok{background:rgba(31,168,85,.12);color:#157A42}
.notice.err{background:rgba(220,60,60,.1);color:#B33A3A}
.helper{font-size:13px;color:var(--ink-soft);text-align:center}
.helper a{font-weight:600;color:var(--gold-deep);text-decoration:none}
.helper a:hover{text-decoration:underline}
.divider{display:flex;align-items:center;gap:14px;color:var(--ink-soft);font-size:12.5px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
.g-slot{display:flex;justify-content:center;min-height:44px}
.g-fallback{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:12px;font-family:var(--body);font-weight:600;font-size:15px;color:var(--ink);cursor:pointer;transition:box-shadow .2s,transform .2s}
.g-fallback:hover{box-shadow:0 8px 20px rgba(14,27,44,.1);transform:translateY(-1px)}
.g-fallback svg{width:20px;height:20px;flex-shrink:0}

footer{padding:24px;text-align:center;font-size:13px;color:var(--ink-soft);border-top:1px solid var(--line)}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="logo" href="https://aigrowthbase.online/"><span class="logo-dot"></span>AI Growth Base</a>
    <a class="back" href="https://aigrowthbase.online/">← Back to home</a>
  </div>
</nav>

<main>
  <div class="auth-card">
    <span class="eyebrow">Client access</span>
    <h1>Sign in to your portal</h1>
    <p class="sub">For active AI Growth Base clients. No password needed.</p>

    <form id="magicForm">
      <input type="hidden" name="access_key" value="1dbad450-233c-40ce-bd1b-3193787fd45f">
      <input type="hidden" name="subject" value="Magic link sign-in request: AI Growth Base">
      <input type="hidden" name="from_name" value="AI Growth Base Auth Page">
      <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off">

      <div class="g-slot" id="gSlot">
        <button type="button" class="g-fallback" id="gFallback">
          <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
          Continue with Google
        </button>
      </div>

      <div class="divider">or use a magic link</div>

      <div class="field">
        <label for="magicEmail">Email</label>
        <input type="email" id="magicEmail" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn" id="magicBtn">Send magic link ✨</button>
      <p class="notice" id="authNotice"></p>
      <p class="helper">We'll email you a sign-in link. No account yet? <a href="https://wa.me/447916627831" target="_blank" rel="noopener">Message us on WhatsApp</a>.</p>
    </form>
  </div>
</main>

<footer>© 2026 AI Growth Base · <a href="https://aigrowthbase.online/" style="font-weight:600;text-decoration:none">aigrowthbase.online</a></footer>

<script>
var SUPABASE_URL = 'https://qbfipmibiuudehrwaydy.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiZmlwbWliaXV1ZGVocndheWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NDQ3ODgsImV4cCI6MjEwMDIyMDc4OH0.FkuiiF5te0mvhm6HMxZezCBO29lhRN2GMk7qqv0j_gI';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var redirectTo = 'https://aigrowthbase.online/';
var authPageUrl = 'https://aigrowthbase.online/auth';

function showNotice(type, message){
  var n=document.getElementById('authNotice');
  n.className='notice ' + type;
  n.style.display='block';
  n.textContent=message;
}

function setBusy(btn, label, busy){
  if(!btn)return;
  btn.disabled=busy;
  btn.textContent=busy ? label : 'Send magic link ✨';
}

window.addEventListener('load',function(){
  var slot=document.getElementById('gSlot');
  var fallback=document.getElementById('gFallback');
  if(slot && fallback){
    fallback.addEventListener('click',async function(){
      fallback.disabled=true;
      fallback.textContent='Connecting…';
      var { error } = await supabase.auth.signInWithOAuth({
        provider:'google',
        options:{ redirectTo: redirectTo }
      });
      if(error){
        fallback.disabled=false;
        fallback.textContent='Continue with Google';
        showNotice('err', 'Google sign-in could not start. Please try the magic link instead.');
      }
    });
  }

  supabase.auth.getSession().then(function(res){
    if(res.data && res.data.session){
      showNotice('ok', '✓ You are already signed in. Redirecting to the home page…');
      window.location.replace('https://aigrowthbase.online/');
    }
  });

  supabase.auth.onAuthStateChange(function(event, session){
    if(session){
      window.location.replace('https://aigrowthbase.online/');
    }
  });
});

(function(){
  var form=document.getElementById('magicForm');
  var btn=document.getElementById('magicBtn');
  if(!form || !btn)return;
  form.addEventListener('submit',async function(e){
    e.preventDefault();
    var email=document.getElementById('magicEmail').value.trim();
    setBusy(btn, 'Sending…', true);
    try{
      var { error } = await supabase.auth.signInWithOtp({
        email: email,
        options:{
          emailRedirectTo: redirectTo,
          shouldCreateUser: true
        }
      });
      if(error){throw error;}
      form.reset();
      showNotice('ok', '✓ Check your inbox. We sent you a secure sign-in link.');
    }catch(err){
      console.error(err);
      var msg = 'Magic link could not be sent. Please make sure your email is correct or use WhatsApp for help.';
      if(err && err.message){
        msg = err.message;
      }
      showNotice('err', msg);
    }finally{
      setBusy(btn, 'Sending…', false);
    }
  });
})();
</script>

</body>
</html>
